<svg width="1920" height="384" viewBox="0 0 1920 384" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1b3aa0"/>
      <stop offset="0.55" stop-color="#2257e0"/>
      <stop offset="1" stop-color="#2f6bff"/>
    </linearGradient>
    <linearGradient id="chip" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#5b86ff"/>
      <stop offset="1" stop-color="#2257e0"/>
    </linearGradient>
    <filter id="sh" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="6" stdDeviation="9" flood-color="#0b1a4a" flood-opacity="0.3"/>
    </filter>
  </defs>

  <rect x="0" y="0" width="1920" height="384" fill="url(#bg)"/>

  <!-- faint poster-grid motif on the right -->
  <g fill="#ffffff" opacity="0.06">
    <rect x="1180" y="60"  width="120" height="176" rx="14"/>
    <rect x="1320" y="60"  width="120" height="176" rx="14"/>
    <rect x="1460" y="60"  width="120" height="176" rx="14"/>
    <rect x="1600" y="60"  width="120" height="176" rx="14"/>
    <rect x="1740" y="60"  width="120" height="176" rx="14"/>
    <rect x="1250" y="256" width="120" height="176" rx="14"/>
    <rect x="1390" y="256" width="120" height="176" rx="14"/>
    <rect x="1530" y="256" width="120" height="176" rx="14"/>
    <rect x="1670" y="256" width="120" height="176" rx="14"/>
    <rect x="1810" y="256" width="120" height="176" rx="14"/>
  </g>

  <!-- icon mark -->
  <g transform="translate(150,96)">
    <rect x="0" y="0" width="192" height="192" rx="46" fill="url(#chip)"/>
    <g filter="url(#sh)">
      <rect x="92"  y="58" width="50" height="74" rx="8" fill="#ffffff" opacity="0.32"/>
      <rect x="80"  y="66" width="50" height="74" rx="8" fill="#ffffff" opacity="0.6"/>
      <rect x="68"  y="74" width="50" height="74" rx="8" fill="#ffffff"/>
    </g>
  </g>

  <!-- wordmark + tagline -->
  <text x="390" y="182" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="104" font-weight="700" fill="#ffffff" letter-spacing="-2">Curator</text>
  <text x="394" y="246" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="40" font-weight="400" fill="#dfe6ff">A modern FileBot alternative. Tidy media, automatically.</text>
</svg>
