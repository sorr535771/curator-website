<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#5b86ff"/>
      <stop offset="1" stop-color="#2257e0"/>
    </linearGradient>
    <filter id="sh" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#0b1a4a" flood-opacity="0.28"/>
    </filter>
  </defs>
  <!-- full-bleed rounded square so a circular crop still shows solid blue to the edge -->
  <rect x="0" y="0" width="512" height="512" rx="120" fill="url(#bg)"/>
  <g filter="url(#sh)">
    <!-- back card (faintest, offset up-right) -->
    <rect x="238" y="150" width="132" height="196" rx="20" fill="#ffffff" opacity="0.32"/>
    <!-- middle card -->
    <rect x="206" y="168" width="132" height="196" rx="20" fill="#ffffff" opacity="0.6"/>
    <!-- front card (solid) -->
    <rect x="174" y="186" width="132" height="196" rx="20" fill="#ffffff"/>
  </g>
</svg>
